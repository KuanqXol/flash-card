<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherCard - Matching Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #080710;
            --bg-end: #0f172a;
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --color-accent: #6366f1;
            --color-accent-hover: #4f46e5;
            
            --card-default-bg: rgba(255, 255, 255, 0.03);
            --card-default-border: rgba(255, 255, 255, 0.1);
            
            --font-display: 'Outfit', sans-serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        .background-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(99, 102, 241, 0) 70%);
            top: 10%;
            right: 10%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            z-index: 10;
            position: relative;
        }

        /* Header Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 1.5rem;
            border-radius: 1.25rem;
            backdrop-filter: blur(10px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            flex-wrap: wrap;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            margin-right: 0.5rem;
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .ctrl-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 0.45rem 1.5rem 0.45rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ctrl-select:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            padding: 0.5rem 1.25rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(-2px);
        }

        /* Match columns stage */
        .match-columns-stage {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 2rem;
            flex-grow: 1;
            align-content: start;
        }

        @media (max-width: 600px) {
            .match-columns-stage {
                gap: 16px;
            }
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .column-header {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-align: center;
        }

        /* Card styles */
        .match-card {
            background: var(--card-default-bg);
            border: 2px solid var(--card-default-border);
            border-radius: 8px;
            padding: 12px 16px;
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .match-card:hover:not(.matched):not(.selected) {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Selected State */
        .match-card.selected {
            border-color: var(--color-accent);
            background: #eef2ff;
            color: #1e1b4b;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.35);
            transform: scale(0.98);
        }

        /* Correct State */
        .match-card.correct {
            border-color: #10b981;
            background: #dcfce7;
            color: #064e3b;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.25);
            transform: scale(0.98);
            cursor: default;
        }

        /* Wrong State */
        .match-card.wrong {
            border-color: #f43f5e;
            background: #fee2e2;
            color: #7f1d1d;
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.25);
        }

        /* Matched State */
        .match-card.matched {
            opacity: 0.15;
            cursor: default;
            pointer-events: none;
            transform: scale(0.95);
        }

        /* Shaking animation when wrong selection */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .shake { 
            animation: shake 0.5s ease; 
        }

        /* Empty state message */
        .empty-msg {
            background: rgba(244, 63, 94, 0.05);
            border: 1px dashed rgba(244, 63, 94, 0.2);
            color: var(--text-secondary);
            border-radius: 1rem;
            padding: 2.5rem 1.5rem;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Footer panel */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.25rem 2rem;
            border-radius: 1.25rem;
            backdrop-filter: blur(10px);
            z-index: 20;
        }

        .progress-indicator {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .btn-submit {
            background: #10b981;
            color: white;
            border: none;
            padding: 0.75rem 2.5rem;
            border-radius: 0.75rem;
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.25);
            transition: all 0.3s ease;
        }

        .btn-submit:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
        }

        .btn-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Modal overlay styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 5, 10, 0.85);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            padding: 1.5rem;
        }

        .modal-card {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.75rem;
            padding: 2.25rem;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: modalIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalIn {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .modal-points {
            font-family: var(--font-display);
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .modal-ratio {
            font-size: 1.05rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        /* Results table */
        .table-wrapper {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.15);
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            text-align: left;
        }

        .results-table th, .results-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .results-table th {
            background: rgba(255, 255, 255, 0.03);
            font-weight: 600;
            color: var(--text-secondary);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .results-table tr:last-child td {
            border-bottom: none;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn-modal {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            padding: 0.8rem 2rem;
            border-radius: 9999px;
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-modal:hover {
            background: var(--color-accent);
            border-color: var(--color-accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        /* Toast Styling */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: -25rem;
            z-index: 9999;
            min-width: 280px;
            max-width: 380px;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: #ffffff;
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            opacity: 0;
        }

        .toast.visible {
            right: 2rem;
            opacity: 1;
        }

        .toast.fade-out {
            opacity: 0;
        }

        .toast-success { background: rgba(16, 185, 129, 0.9); border: 1px solid rgba(16, 185, 129, 0.3); }
        .toast-error { background: rgba(244, 63, 94, 0.9); border: 1px solid rgba(244, 63, 94, 0.3); }
        .toast-info { background: rgba(59, 130, 246, 0.9); border: 1px solid rgba(59, 130, 246, 0.3); }
        .toast-icon { font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="background-glow"></div>

    <div class="container">
        <header>
            <div class="header-left">
                <a href="/" class="logo">🔗 Nối Từ</a>
                
                <div class="controls-group">
                    <select class="ctrl-select" id="select-pairs">
                        <option value="4">4 cặp thẻ</option>
                        <option value="6" selected>6 cặp thẻ</option>
                        <option value="8">8 cặp thẻ</option>
                    </select>
                    
                    <select class="ctrl-select" id="select-filter">
                        <option value="all">Tất cả trạng thái</option>
                        <option value="new">Từ mới</option>
                        <option value="learning">Đang học</option>
                        <option value="learned">Đã thuộc</option>
                    </select>
                </div>
            </div>
            
            <a href="/" class="back-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Trang chủ
            </a>
        </header>

        <!-- Main matching area -->
        <main class="match-columns-stage">
            <!-- Left Column: English -->
            <div class="column">
                <div class="column-header">Tiếng Anh</div>
                <div id="en-column" style="display: flex; flex-direction: column; gap: 0.85rem;">
                    <!-- Cards will be populated here -->
                </div>
            </div>
            
            <!-- Right Column: Vietnamese -->
            <div class="column">
                <div class="column-header">Nghĩa tiếng Việt</div>
                <div id="vi-column" style="display: flex; flex-direction: column; gap: 0.85rem;">
                    <!-- Cards will be populated here -->
                </div>
            </div>
        </main>

        <!-- Footer Progress and Submission Bar -->
        <footer>
            <div class="progress-indicator" id="progress-text">0/0 cặp đã nối</div>
            <button class="btn-submit" id="btn-submit" disabled>Nộp bài</button>
        </footer>
    </div>

    <!-- Result Modal Overlay -->
    <div class="modal-overlay" id="result-modal">
        <div class="modal-card">
            <div class="modal-title">Kết quả 🎯</div>
            <div class="modal-points" id="modal-points">+0 điểm</div>
            <div class="modal-ratio" id="modal-ratio">Đúng: 0 / 0 cặp</div>
            
            <div class="table-wrapper">
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>Từ tiếng Anh</th>
                            <th>Nghĩa tiếng Việt</th>
                            <th style="text-align:center; width: 60px;">Kết quả</th>
                        </tr>
                    </thead>
                    <tbody id="modal-table-body">
                        <!-- Dynamic details rows -->
                    </tbody>
                </table>
            </div>
            
            <div class="modal-actions">
                <button class="btn-modal" onclick="loadWords(); closeModal();">🔄 Chơi lại</button>
                <a href="/" class="btn-modal" style="background: var(--color-accent); border-color: var(--color-accent);">🏠 Dashboard</a>
            </div>
        </div>
    </div>

    <!-- Load matching game script -->
    <script src="/static/js/matching.js"></script>
</body>
</html>
