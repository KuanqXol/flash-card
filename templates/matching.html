<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherCard - Matching Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #080710;
            --bg-end: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --color-accent: #6366f1;
            --color-accent-hover: #4f46e5;
            --color-correct: #10b981;
            --color-incorrect: #f43f5e;
            --font-display: 'Outfit', sans-serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        .title {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 700;
        }

        /* Stats panel */
        .game-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            font-family: var(--font-display);
            font-weight: 600;
        }

        .game-stat span {
            color: #818cf8;
        }

        /* Card grid */
        .matching-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            flex-grow: 1;
            align-content: start;
        }

        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1.25rem;
            padding: 1.5rem 1rem;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .match-card:hover:not(.matched):not(.selected) {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.1);
        }

        .match-card.selected {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--color-accent);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            transform: scale(0.98);
        }

        .match-card.correct {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--color-correct);
            color: var(--color-correct);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
            transform: scale(0.98);
        }

        .match-card.incorrect {
            background: rgba(244, 63, 94, 0.2);
            border-color: var(--color-incorrect);
            color: var(--color-incorrect);
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.3);
            animation: shake 0.4s ease;
        }

        .match-card.matched {
            opacity: 0.25;
            cursor: default;
            pointer-events: none;
            transform: scale(0.95);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        /* End game card */
        .end-card {
            display: none;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 2rem;
            padding: 3rem 2rem;
            backdrop-filter: blur(16px);
            text-align: center;
            max-width: 500px;
            margin: 2rem auto;
        }

        .end-title {
            font-family: var(--font-display);
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #34d399, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .end-score {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            color: var(--text-secondary);
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 0.85rem 2rem;
            border-radius: 9999px;
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-action:hover {
            background: var(--color-accent);
            border-color: var(--color-accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Dashboard
            </a>
            <div class="title">Matching Game</div>
            <div style="width: 80px;"></div> <!-- balance -->
        </header>

        <div id="game-panel">
            <div class="game-bar">
                <div class="game-stat">Score: <span id="game-score">0</span></div>
                <div class="game-stat">Mistakes: <span id="game-mistakes">0</span></div>
            </div>

            <div class="matching-grid" id="grid">
                <!-- Cards will be populated here -->
            </div>
        </div>

        <div class="end-card" id="end-panel">
            <div class="end-title">Game Cleared!</div>
            <div class="end-score" id="end-score-details">You matched all words with 0 errors!</div>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn-action" onclick="startGame()">Play Again</button>
                <a href="/" class="btn-action" style="background: var(--color-accent); border-color: var(--color-accent);">Home</a>
            </div>
        </div>
    </div>

    <script>
        let rawWords = [];
        let items = [];
        let firstCard = null;
        let secondCard = null;
        let lockGrid = false;
        let score = 0;
        let mistakes = 0;
        let matchesCount = 0;

        async function startGame() {
            try {
                // Fetch 6 random words
                const response = await fetch('/api/words/random?n=6');
                rawWords = await response.json();
                
                if (rawWords.length < 3) {
                    const grid = document.getElementById('grid');
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--text-secondary);">Needs at least 3 vocabulary words in database to start matching. Run CSV import first!</div>';
                    return;
                }

                // Reset variables
                items = [];
                firstCard = null;
                secondCard = null;
                lockGrid = false;
                score = 0;
                mistakes = 0;
                matchesCount = 0;

                document.getElementById('game-score').textContent = score;
                document.getElementById('game-mistakes').textContent = mistakes;
                document.getElementById('game-panel').style.display = 'block';
                document.getElementById('end-panel').style.display = 'none';

                // Setup cards
                rawWords.forEach(w => {
                    // English card
                    items.push({
                        id: w.id,
                        text: w.word,
                        type: 'english',
                        word_obj: w
                    });
                    // Vietnamese card
                    items.push({
                        id: w.id,
                        text: w.short_translation || 'N/A',
                        type: 'vietnamese',
                        word_obj: w
                    });
                });

                // Shuffle items
                items.sort(() => Math.random() - 0.5);

                // Build HTML
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                
                items.forEach((item, index) => {
                    const cardDiv = document.createElement('div');
                    cardDiv.classList.add('match-card');
                    cardDiv.dataset.index = index;
                    cardDiv.dataset.wordId = item.id;
                    cardDiv.dataset.type = item.type;
                    cardDiv.textContent = item.text;
                    cardDiv.addEventListener('click', onCardClick);
                    grid.appendChild(cardDiv);
                });

            } catch (err) {
                console.error("Error starting match game:", err);
            }
        }

        function onCardClick(e) {
            if (lockGrid) return;
            const card = e.currentTarget;
            
            if (card.classList.contains('matched') || card.classList.contains('selected')) return;

            card.classList.add('selected');

            if (!firstCard) {
                firstCard = card;
                return;
            }

            secondCard = card;
            checkMatch();
        }

        async function checkMatch() {
            lockGrid = true;
            
            const firstId = firstCard.dataset.wordId;
            const firstType = firstCard.dataset.type;
            const secondId = secondCard.dataset.wordId;
            const secondType = secondCard.dataset.type;

            // They match if they have the same ID but different types
            if (firstId === secondId && firstType !== secondType) {
                // SUCCESS MATCH
                firstCard.classList.remove('selected');
                secondCard.classList.remove('selected');
                firstCard.classList.add('correct');
                secondCard.classList.add('correct');

                // Record history for this word as correct (+1 point, is_correct=1)
                await saveReview(firstId, 1, true);

                setTimeout(() => {
                    firstCard.classList.add('matched');
                    secondCard.classList.add('matched');
                    firstCard.classList.remove('correct');
                    secondCard.classList.remove('correct');
                    
                    score += 10;
                    document.getElementById('game-score').textContent = score;
                    matchesCount++;

                    resetSelection();
                    
                    if (matchesCount === rawWords.length) {
                        endGame();
                    }
                }, 400);

            } else {
                // INCORRECT MATCH
                firstCard.classList.remove('selected');
                secondCard.classList.remove('selected');
                firstCard.classList.add('incorrect');
                secondCard.classList.add('incorrect');

                // Penalize score update in DB for both words (-1 score delta, is_correct=0)
                await saveReview(firstId, -1, false);
                if (firstId !== secondId) {
                    await saveReview(secondId, -1, false);
                }

                setTimeout(() => {
                    firstCard.classList.remove('incorrect');
                    secondCard.classList.remove('incorrect');
                    
                    mistakes++;
                    document.getElementById('game-mistakes').textContent = mistakes;
                    score = Math.max(0, score - 2);
                    document.getElementById('game-score').textContent = score;

                    resetSelection();
                }, 800);
            }
        }

        function resetSelection() {
            firstCard = null;
            secondCard = null;
            lockGrid = false;
        }

        async function saveReview(wordId, delta, isCorrect) {
            try {
                await fetch('/api/review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        word_id: parseInt(wordId),
                        delta: delta,
                        mode: 'matching',
                        is_correct: isCorrect
                    })
                });
            } catch (e) {
                console.error("Failed to post score delta:", e);
            }
        }

        function endGame() {
            document.getElementById('game-panel').style.display = 'none';
            document.getElementById('end-panel').style.display = 'block';
            
            const details = document.getElementById('end-score-details');
            details.textContent = `Completed with a final score of ${score} and made ${mistakes} mistakes.`;
        }

        window.addEventListener('DOMContentLoaded', startGame);
    </script>
</body>
</html>
