<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherCard - Flashcard Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #080710;
            --bg-end: #0f172a;
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --color-accent: #6366f1;
            --color-accent-hover: #4f46e5;
            
            --front-grad-start: #eef2ff;
            --front-grad-end: #e0e7ff;
            --back-grad-start: #f5f3ff;
            --back-grad-end: #ede9fe;
            
            --font-display: 'Outfit', sans-serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        .background-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, rgba(99, 102, 241, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            z-index: 10;
            position: relative;
        }

        /* Header layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 1.5rem;
            border-radius: 1.25rem;
            backdrop-filter: blur(10px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        /* Filter dropdown */
        .filter-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .filter-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 0.45rem 1.5rem 0.45rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-select:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            padding: 0.5rem 1.25rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(-2px);
        }

        /* Corner Session Statistics */
        .session-info {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(244, 63, 94, 0.05) 100%);
            border: 1px solid rgba(129, 140, 248, 0.2);
            padding: 0.6rem 1.2rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: var(--font-display);
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
        }

        .session-info span {
            color: #818cf8;
        }

        /* 3D Flashcard Stage */
        .flashcard-stage {
            perspective: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2.5rem;
            min-height: 380px;
        }

        .flashcard {
            width: 100%;
            max-width: 550px;
            height: 350px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 2rem;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        /* Front Face (Light Indigo) */
        .card-front {
            background: linear-gradient(135deg, var(--front-grad-start), var(--front-grad-end));
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .card-front .word-display {
            font-family: var(--font-display);
            font-size: 3.2rem;
            font-weight: 800;
            color: #1e1b4b;
            letter-spacing: -0.02em;
            margin-top: 1rem;
        }

        .card-front .phonetic-display {
            font-size: 1.2rem;
            color: #4f46e5;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        .hint-click {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 500;
            opacity: 0.7;
        }

        /* Back Face (Light Violet) */
        .card-back {
            background: linear-gradient(135deg, var(--back-grad-start), var(--back-grad-end));
            transform: rotateY(180deg);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .card-back .translation-display {
            font-size: 1.25rem;
            font-weight: 600;
            color: #3b0764;
            line-height: 1.6;
            margin: auto 0;
            max-height: 180px;
            overflow-y: auto;
            padding: 0 1rem;
        }

        .card-back .card-meta {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            width: 100%;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            padding-top: 1rem;
        }

        .meta-item {
            font-size: 0.85rem;
            color: #5b21b6;
            font-weight: 600;
        }

        /* Status badges */
        .status-badge {
            font-size: 0.75rem;
            padding: 0.3rem 0.9rem;
            border-radius: 9999px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .badge-new { background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .badge-learning { background-color: #fef3c7; color: #b45309; border: 1px solid #fde68a; }
        .badge-learned { background-color: #d1fae5; color: #047857; border: 1px solid #a7f3d0; }
        .badge-empty { background-color: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }

        /* Controls Panel */
        .control-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
        }

        .primary-actions {
            display: flex;
            gap: 1rem;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        /* Buttons */
        .btn-flip {
            background: var(--color-accent);
            color: white;
            border: none;
            padding: 0.9rem 2.5rem;
            border-radius: 1rem;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }

        .btn-flip:hover {
            background: var(--color-accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-learned {
            background: #10b981;
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 1rem;
            font-family: var(--font-display);
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.25);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-learned:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
        }

        .btn-skip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 0.5rem 1.25rem;
            border-radius: 0.75rem;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-skip:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }

        /* 5-Star Rating Bar */
        .rating-bar {
            display: none;
            gap: 0.75rem;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .rating-bar.visible {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .star-rating {
            display: flex;
            gap: 0.35rem;
        }

        .star-rating svg {
            width: 2.25rem;
            height: 2.25rem;
            fill: #4b5563; /* unselected */
            stroke: #374151;
            stroke-width: 1.5;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .star-rating svg.hover {
            fill: #fbbf24;
            stroke: #d97706;
            transform: scale(1.15);
        }

        .star-rating svg.selected {
            fill: #fb923c;
            stroke: #ea580c;
            transform: scale(1.1) rotate(5deg);
        }

        /* Toast Notifications Styling */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: -25rem; /* Offscreen starting point */
            z-index: 9999;
            min-width: 280px;
            max-width: 380px;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: #ffffff;
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            opacity: 0;
        }

        .toast.visible {
            right: 2rem;
            opacity: 1;
        }

        .toast.fade-out {
            opacity: 0;
        }

        .toast-success {
            background: rgba(16, 185, 129, 0.9);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .toast-error {
            background: rgba(244, 63, 94, 0.9);
            border: 1px solid rgba(244, 63, 94, 0.3);
        }

        .toast-info {
            background: rgba(59, 130, 246, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .toast-icon {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>

    <div class="container">
        <header>
            <div class="header-left">
                <a href="/" class="logo">AetherCard</a>
                
                <div class="filter-wrapper">
                    <span class="filter-label">Bộ lọc:</span>
                    <select class="filter-select" id="filter-dropdown">
                        <option value="all">Tất cả từ vựng</option>
                        <option value="new">Từ mới</option>
                        <option value="learning">Đang học</option>
                        <option value="learned">Đã thuộc</option>
                    </select>
                </div>
            </div>
            
            <a href="/" class="back-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Trang chủ
            </a>
        </header>

        <!-- Session Counter -->
        <div class="session-info">
            Đã ôn: <span id="session-count">0</span> từ | +<span id="session-score">0</span> điểm hôm nay
        </div>

        <!-- Card Stage -->
        <div class="flashcard-stage">
            <div class="flashcard" id="flashcard" onclick="flipCard()">
                <!-- Front Side -->
                <div class="card-face card-front">
                    <span class="status-badge" id="card-status-badge">Trống</span>
                    <div>
                        <div class="word-display" id="card-word">Loading...</div>
                        <div class="phonetic-display" id="card-phonetic">[/loading/]</div>
                    </div>
                    <span class="hint-click">Click thẻ hoặc nhấn Space để xem nghĩa</span>
                </div>
                
                <!-- Back Side -->
                <div class="card-face card-back">
                    <div class="translation-display" id="card-translation">Nghĩa tiếng Việt</div>
                    
                    <div class="card-meta">
                        <span class="meta-item" id="card-score">Điểm: 0 ⭐</span>
                        <span class="meta-item" id="card-reviews">Đã ôn: 0 lần</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls Stage -->
        <div class="control-panel">
            <div class="primary-actions">
                <button class="btn-flip" id="btn-flip" onclick="flipCard()">👁 Xem nghĩa</button>
                
                <!-- 5 Star rating bar -->
                <div class="rating-bar" id="rating-bar">
                    <div class="star-rating">
                        <!-- Star SVGs -->
                        <svg data-val="1" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        <svg data-val="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        <svg data-val="3" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        <svg data-val="4" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        <svg data-val="5" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    </div>
                </div>

                <button class="btn-learned" onclick="markLearned(event)">✅ Đã thuộc</button>
            </div>
            
            <button class="btn-skip" onclick="loadNextWord()">⏭ Bỏ qua</button>
        </div>
    </div>

    <!-- Import our custom javascript actions -->
    <script src="/static/js/flashcard.js"></script>
    <script>
        // Override event handlers or prevent card lật when clicking buttons
        function markLearned(event) {
            event.stopPropagation();
            if (typeof window.markLearned === 'function') {
                window.markLearned();
            }
        }
    </script>
</body>
</html>
